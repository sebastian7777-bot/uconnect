<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <mask id="circleMask">
      <rect width="100" height="100" fill="white"/>
      <rect x="27" y="52" width="46" height="25" rx="0" fill="black"/>
    </mask>
    <mask id="squareMask">
      <rect width="100" height="100" fill="white"/>
      <path d="M24 50 A26 26 0 0 0 76 50" fill="black"/>
    </mask>
  </defs>
  <!-- Cuadrado redondeado - parte de atrás (debajo del círculo) -->
  <rect x="27" y="27" width="46" height="46" rx="13" ry="13"
        stroke="white" stroke-width="4" fill="none"
        mask="url(#squareMask)"/>
  <!-- Círculo - parte de atrás (debajo del cuadrado) -->
  <circle cx="50" cy="50" r="26"
          stroke="white" stroke-width="4" fill="none"
          mask="url(#circleMask)"/>
  <!-- Cuadrado redondeado - parte de adelante -->
  <rect x="27" y="27" width="46" height="46" rx="13" ry="13"
        stroke="white" stroke-width="4" fill="none"
        clip-path="inset(52% 0 0 0)"/>
  <!-- Círculo - parte de adelante -->
  <circle cx="50" cy="50" r="26"
          stroke="white" stroke-width="4" fill="none"
          clip-path="inset(0 0 50% 0)"/>
</svg>
